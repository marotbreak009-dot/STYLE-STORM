<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Storm - Luxury System</title>
    <style>
        body {
            background: radial-gradient(circle, #5a5a5a 0%, #2c2c2c 50%, #121212 100%);
            color: #d1d1d1; font-family: 'Georgia', serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .contenedor-principal {
            background: linear-gradient(145deg, #1f1f1f, #2a2a2a);
            padding: 50px 40px; border: 1px solid #4a4a4a;
            outline: 4px double #5a5a5a; outline-offset: -15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center;
            width: 420px; border-radius: 5px;
        }
        h1 { color: #f5f5dc; font-size: 2.8rem; text-transform: uppercase; letter-spacing: 4px; margin: 0; }
        .eslogan { color: #b0b0b0; font-size: 0.9rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
        .promo-card {
            background: #1a1a1a; border-left: 4px solid #f5f5dc;
            margin-bottom: 12px; padding: 15px 20px; text-align: left;
            cursor: pointer; transition: 0.3s ease; text-transform: uppercase;
            font-weight: bold; letter-spacing: 1px; font-size: 0.85rem;
        }
        input {
            background-color: #1a1a1a; border: 1px solid #4a4a4a; color: #f5f5dc;
            padding: 15px; width: 85%; margin-bottom: 10px; text-align: center; outline: none;
        }
        .btn-vintage {
            background-color: #4a4a4a; color: #f5f5dc; border: 1px solid #f5f5dc;
            padding: 18px 35px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; letter-spacing: 3px;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); display: none;
            justify-content: center; align-items: flex-start;
            z-index: 1000; overflow-y: auto; padding: 40px 0;
        }
        .tarjeta-base {
            width: 95%; max-width: 650px; padding: 50px 30px;
            border-radius: 15px; position: relative;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 1); text-align: center; margin: auto;
        }
        .leal-design { background: linear-gradient(135deg, #4b3621 0%, #2c1e12 100%); border: 2px solid #5d4037; }
        .fidelidad-design { background: linear-gradient(180deg, #444 0%, #000 100%); border: 1px solid #555; }
        .exclusive-design { background: #2a1a0f; border: 1px solid #3d2b1f; }
        .special-design-points { background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); border: 4px double #d4af37; }
        .product-design { background: linear-gradient(135deg, #4d4d4d 0%, #1a1a1a 100%); border: 2px solid #999; }
        .icono-circulo { width: 42px; height: 42px; border: 2px solid #ffffff; border-radius: 50%; }
        .icono-circulo.marcado { background: #ffffff !important; display: flex; justify-content: center; align-items: center; }
        .icono-circulo.marcado::after { content: "✂"; color: #000; }
        .contenedor-filas { display: flex; flex-direction: column; gap: 20px; align-items: center; margin: 20px 0; }
        .fila-promo { display: flex; align-items: center; gap: 15px; width: 100%; justify-content: center; }
        .cerrar-btn { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; cursor: pointer; color: #ffffff; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <h1>STYLE STORM</h1>
        <p class="eslogan">Barber Studio</p>
        <div id="registro">
            <input type="text" id="nombre" placeholder="NOMBRE">
            <input type="text" id="apellido" placeholder="APELLIDO">
            <input type="text" id="whatsapp-registro" placeholder="WHATSAPP">
            <button class="btn-vintage" onclick="entrar()">VER PROMOS</button>
        </div>
        <div id="menu-promos" class="hidden">
            <p id="saludo"></p>
            <div class="promo-card" onclick="abrirModal('modal-leal')">TARJETA LEAL</div>
            <div class="promo-card" onclick="abrirModal('modal-fidelidad')">TARJETA FIDELIDAD</div>
            <div class="promo-card" onclick="abrirModal('modal-exclusiva')">LEALTAD EXCLUSIVA</div>
            <button class="btn-vintage" onclick="finalizarCierre()">CERRAR SESIÓN</button>
        </div>
    </div>

    <div id="modal-leal" class="modal"><div class="tarjeta-base leal-design"><span class="cerrar-btn" onclick="cerrar()">×</span><h2>TARJETA LEAL</h2><div class="contenedor-filas" id="filas-leal"></div></div></div>
    <div id="modal-fidelidad" class="modal"><div class="tarjeta-base fidelidad-design"><span class="cerrar-btn" onclick="cerrar()">×</span><h2>FIDELIDAD</h2><div class="contenedor-filas" id="filas-fidelidad"></div></div></div>
    <div id="modal-exclusiva" class="modal"><div class="tarjeta-base exclusive-design"><span class="cerrar-btn" onclick="cerrar()">×</span><h2>EXCLUSIVA</h2><div class="contenedor-filas" id="filas-exclusiva"></div></div></div>

    <script>
        const URL_DATABASE = "https://script.google.com/macros/s/AKfycbylyhZwtCD9-wagqZGJUrzwAZTVaPFcPCmdnmDZtEloLP0Ux-vU1zmk6_YrOJdVZ2T80Q/exec"; 
        const PIN = "storm05.z";
        let CLIENTE_ID = ""; 

        function entrar() {
            const nom = document.getElementById('nombre').value;
            const tel = document.getElementById('whatsapp-registro').value;
            if(!nom || !tel) return alert("Faltan datos");
            CLIENTE_ID = tel.trim();
            document.getElementById('registro').classList.add('hidden');
            document.getElementById('menu-promos').classList.remove('hidden');
            document.getElementById('saludo').innerText = "HOLA, " + nom.toUpperCase();

            const formData = new FormData();
            formData.append('nombre', nom);
            formData.append('apellido', document.getElementById('apellido').value);
            formData.append('whatsapp', tel);

            fetch(URL_DATABASE, { method: 'POST', body: formData }).catch(err => console.log("Error"));
        }
        function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
        function cerrar() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function finalizarCierre() { location.reload(); }
    </script>
</body>
</html>
